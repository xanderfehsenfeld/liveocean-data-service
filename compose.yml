services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PW=${POSTGRES_PW}
      - POSTGRES_PASSWORD=${POSTGRES_PW}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/19/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${PG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
  web:
    build: .
    command: uv run python manage.py runserver 0.0.0.0:8080
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_HOST_DEV: db
      PG_HOST: db
      DATABASE_USER: ${POSTGRES_USER}
      POSTGRES_PW: ${POSTGRES_PW}
      PG_PSWD: ${POSTGRES_PW}
      PG_USER: ${POSTGRES_USER}
      PG_DB_NAME: ${PG_DB_NAME}

volumes:
  pgdata:
